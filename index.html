<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB-115 Final</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="headerContainer">
        <h1 id="headerText">Generic Survival Game</h1>
        <p id="dayCounter"></p>
    </div>

    <div class="statusContainer">
        <p id="statusText">You rub your head as you wake up. You don't remember anything before this, but from what you can see, you're stranded on a hot, humid, sandy island.</p>
        <button id="continueTextBtn" class="pointer">Press to Start</button>
        <div id="actions">
            <button id="search" class="pointer">Search</button>
            <button id="craft" class="pointer">Craft</button>
            <button id="inventory" class="pointer">Inventory</button>    
        </div>

    </div>

    <div id="inventoryWindow">
        <button id="closeInvBtn" class="pointer">X</button>
        <p id="invDisplay"></p>
    </div>

    <div id="craftWindow">
        <button id="closeCraftBtn" class="pointer">X</button>
        <div id="craftOptions">
            <div id="knife" class="pointer hideCraft" >Knife<br>1 wood, 1 stone</div>
            <div id="campfire" class="pointer hideCraft">Campfire<br>2 wood</div>
            <div id="raft" class="pointer hideCraft">Raft<br>4 wood</div>
        </div>
        <button id="confirmCraft" class="pointer">Craft</button>
    </div>
</body>
</html>
