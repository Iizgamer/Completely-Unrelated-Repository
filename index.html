<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB-115 Final</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="headerContainer">
        <h1 id="headerText">Generic Survival Game</h1>
        <p id="dayCounter"></p>
    </div>

    <div class="statusContainer">
        <p id="statusText">You rub your head as you wake up. You don't remember anything before this, but from what you can see, you're stranded on a hot, humid, sandy island.</p>
        <button id="continueTextBtn">Press to Start</button>
        <div id="actions">
            <button id="search">Search</button>
            <button id="craft">Craft</button>
            <button id="inventory">Inventory</button>    
        </div>

    </div>

    <div class="inventory">
        <div id="inventoryWindow">
            <button>Close</button>
        </div>
    </div>
</body>
</html>
